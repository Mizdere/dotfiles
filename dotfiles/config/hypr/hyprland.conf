
# ~/.config/hypr/hyprland.conf
# Clean + consistent: Dolphin file manager, rofi launcher, kitty terminal

################
### MONITORS ###
################
monitor = eDP-1,2560x1600@240,0x0,1.25

xwayland {
  force_zero_scaling = true
}

###################
### ENVIRONMENT ###
###################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GTK_USE_PORTAL,1
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,kde
env = WLR_NO_HARDWARE_CURSORS,1
env = GTK_THEME,Adwaita:dark
env = AQ_DRM_DEVICES,/dev/dri/card1
env = AQ_NO_MODIFIERS,1
env = AQ_NO_ATOMIC,1

cursor {
  no_hardware_cursors = true
}

################
### VARIABLES ##
################
$mainMod     = SUPER
$terminal    = kitty
$fileManager = ~/.local/bin/dolphin-dark
$menu        = ~/.config/rofi/archysystem/launch-white.sh

############################
### AUTOSTART / DAEMONS ###
############################
exec-once = awww-daemon --quiet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE QT_QPA_PLATFORM QT_QPA_PLATFORMTHEME GTK_USE_PORTAL AQ_DRM_DEVICES AQ_NO_MODIFIERS AQ_NO_ATOMIC
exec-once = systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE QT_QPA_PLATFORM QT_QPA_PLATFORMTHEME GTK_USE_PORTAL AQ_DRM_DEVICES AQ_NO_MODIFIERS AQ_NO_ATOMIC
exec-once = ~/.config/hypr/launch_portals.sh
exec-once = pgrep -f 'orbit daemon' >/dev/null || ~/.local/bin/orbit daemon

# auth / secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# notifications (minimal)
exec-once = pgrep -x dunst >/dev/null || dunst

# theme helpers / fun
exec-once = ~/.local/bin/apply_cached_theme.sh
exec-once = pywalfox update
exec-once = ~/.local/bin/osd_control.py --watch
exec-once = ~/.local/bin/audio_defaults.sh

# No border when only one tiled window is on the active workspace
exec-once = pgrep -f hypr-borderless-single >/dev/null || ~/.local/bin/hypr-borderless-single

# status bar (pick one)
# exec-once = hyprpanel
# exec-once = eww daemon &
exec-once = waybar

# Unit-3 Quickshell (disabled)
# exec-once = env QT_MEDIA_BACKEND=ffmpeg qs

# apps
exec-once = discord
exec-once = steam

######################
### WINDOW RULES   ###
######################

windowrule {
    name = linux-gremlin
    no_blur = on
    no_shadow = on
    border_size = 0
    match:title = ilgwg_desktop_gremlins.py
}

# App workspaces
windowrule = match:class discord, workspace 2 silent
windowrule = match:class steam, workspace 3 silent

# Opacity
windowrule = match:class kitty, opacity 0.90 0.90
windowrule = match:class org.kde.dolphin, opacity 0.96 0.96

# Unit-3 Quickshell overlay rules
windowrule = float on, match:class ^(quickshell)$
windowrule = pin on, match:class ^(quickshell)$
windowrule = no_blur on, match:class ^(quickshell)$
windowrule = no_shadow on, match:class ^(quickshell)$

# Orbit layer popup blur
layerrule = blur on, match:namespace orbit
layerrule = ignore_alpha 0.01, match:namespace orbit
layerrule = blur on, match:namespace waybar-.*-popup
layerrule = ignore_alpha 0.01, match:namespace waybar-.*-popup

# Boot kitty window rules (match by title)
windowrule = match:title bootkitty, workspace 1 silent
windowrule = match:title bootkitty, float 1
windowrule = match:title bootkitty, size 900 520
windowrule = match:title bootkitty, move 80 80
windowrule = match:title bootkitty, opacity 0.90 0.90

# Launch boot kitty on workspace 1
exec-once = [workspace 1 silent] ~/.local/bin/bootkitty.sh

################
### GENERAL  ###
################
general {
  gaps_in = 1
  gaps_out = 1
  border_size = 1
  # Keep border_size for resize_on_border, but make borders invisible.
  col.active_border = rgba(00000000) rgba(00000000) 45deg
  col.inactive_border = rgba(00000000)
  resize_on_border = true
  allow_tearing = false
  layout = dwindle
}



###################
### DECORATION  ###
###################
decoration {
  rounding = 0
  rounding_power = 2
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.17
  }
}

###################
### ANIMATIONS   ###
###################
animations {
  enabled = no
  bezier = easeOutQuint,0.23,1,0.32,1
  animation = global, 1, 10, default
  animation = windows, 1, 5, easeOutQuint
  animation = fade, 1, 3, default
}

#############
### MISC  ###
#############
misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
}

#################
### DWINDLE   ###
#################
dwindle {
  preserve_split = true
}

###############
### INPUT    ###
###############
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

##################
### KEYBINDS    ###
##################
# Launchers
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu

# Unit-3 Quickshell player toggle (avoid clobbering your SUPER+RETURN terminal bind)
bind = $mainMod, Backspace, exec, sh -c 'echo t >> /tmp/qs-toggle'
bind = $mainMod SHIFT, Backspace, exec, sh -c 'echo t >> /tmp/qs-front'

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 900 520 && hyprctl dispatch centerwindow
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit

# Move window
bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse move
bindm = $mainMod, mouse:272, movewindow

# Wallpaper
bind = $mainMod, equal, exec, ~/.local/bin/change_wallpaper.sh
bind = $mainMod, KP_Add, exec, ~/.local/bin/change_wallpaper.sh

# Screenshots
bind = , Print, exec, ~/.local/bin/screenshot_full.sh
bindl = , XF86Launch1, exec, ~/.local/bin/screenshot_frozen_area.sh
bindl = $mainMod, XF86Launch1, exec, ~/.local/bin/screenshot_frozen_area.sh save

# Volume (wpctl)
bindl = $mainMod, F1, exec, ~/.local/bin/osd_control.py volume mute
bind = $mainMod, F2, exec, ~/.local/bin/keyboard_brightness.sh down
bind = $mainMod, F3, exec, ~/.local/bin/keyboard_brightness.sh up
bindl = , XF86AudioMicMute, exec, ~/.local/bin/osd_control.py mic mute
bindel = , XF86AudioLowerVolume, exec, ~/.local/bin/osd_control.py volume down
bindel = , XF86AudioRaiseVolume, exec, ~/.local/bin/osd_control.py volume up

# Brightness
bindel = $mainMod, F7, exec, ~/.local/bin/osd_control.py brightness down
bindel = $mainMod, F8, exec, ~/.local/bin/osd_control.py brightness up

# E-ink toggle
bind = $mainMod, I, exec, ~/.local/bin/toggle-eink
